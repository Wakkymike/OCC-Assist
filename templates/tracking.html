{% extends 'base.html' %}

{% block title %}Tracking{% endblock %}

{% block head_extras %}
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.21.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.21.0/mapbox-gl.js" defer></script>
  <script>
    window.MAPBOX_TOKEN = 'YOUR_MAPBOX_ACCESS_TOKEN_HERE';
  </script>
{% endblock %}

{% block content %}
  <section class="content-panel fullwidth">
    <div class="panel-head">
      <p class="brand-subtitle">Real-time routing</p>
      <h1>Tracking</h1>
    </div>
    <div id="map" class="map-shell"></div>
    <p class="map-note">Mapbox API key not configured. Add your token to the window.MAPBOX_TOKEN variable in this template.</p>
  </section>
{% endblock %}
