{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
  <section class="auth-panel">
    <div class="auth-brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div>
        <span class="brand-subtitle">Welcome To</span>
        <h1>OCC Assist</h1>
      </div>
    </div>
    <p class="auth-intro">Secure access to live transit operations and intelligence.</p>

    <form id="login-form" autocomplete="off" novalidate data-login-url="{{ url_for('login') }}">
      <div class="field">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
          minlength="8"
        />
      </div>

      <div class="field remember">
        <label>
          <input type="checkbox" id="remember" name="remember" />
          Remember me
        </label>
      </div>

      <button class="btn primary" type="submit">Sign in securely</button>
      <div id="form-message" class="message" aria-live="polite"></div>
    </form>
  </section>
{% endblock %}
